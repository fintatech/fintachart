<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FintaChart — React + TypeScript Example</title>

  <!-- Chart CSS -->
  <link rel="stylesheet" href="node_modules/@fintatech/fintachart/css/external/spectrum.min.css">
  <link rel="stylesheet" href="node_modules/@fintatech/fintachart/css/external/toastr.min.css">
  <link rel="stylesheet" href="node_modules/@fintatech/fintachart/css/external/jqNumericField.min.css">
  <link rel="stylesheet" href="node_modules/@fintatech/fintachart/css/FintaChart.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Chart framework dependencies (must load before React app) -->
  <script src="node_modules/@fintatech/fintachart/scripts/frameworks/Intl.min.js"></script>
  <script src="node_modules/@fintatech/fintachart/scripts/frameworks/moment.min.js"></script>
  <script src="node_modules/@fintatech/fintachart/scripts/frameworks/detectizr.min.js"></script>
  <script src="node_modules/@fintatech/fintachart/scripts/frameworks/dom-to-image-more.min.js"></script>
  <script src="node_modules/@fintatech/fintachart/scripts/frameworks/i18nextXHRBackend.min.js"></script>

  <!-- UI plugins required by toolbar / dialogs / scrollbar -->
  <script src="node_modules/@fintatech/fintachart/scripts/frameworks-modified/autocolumnlist.js"></script>

  <!-- Chart library -->
  <script src="node_modules/@fintatech/fintachart/scripts/FintaChart.min.js"></script>

  <!-- Post-load plugins (spectrum / switchery / toastr / i18next hook into FintaChart) -->
  <script src="node_modules/@fintatech/fintachart/scripts/frameworks-modified/spectrum.js"></script>
  <script src="node_modules/@fintatech/fintachart/scripts/frameworks-modified/switchery.js"></script>
  <script src="node_modules/@fintatech/fintachart/scripts/frameworks-modified/toastr.js"></script>
  <script src="node_modules/@fintatech/fintachart/scripts/frameworks-modified/i18next.js"></script>

  <!-- Theme -->
  <script src="node_modules/@fintatech/fintachart/scripts/themes/defaultTheme.js"></script>

  <!-- React app -->
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
